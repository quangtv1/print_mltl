name: Build

# Build the MucLucHoSo solution (.NET 8, WPF + Word COM interop) on Windows for
# every push to main / PR. Publishes a portable self-contained win-x64 build and
# uploads it as an artifact. UI/PDF fidelity still need manual check on Windows.

on:
  push:
    branches:
      - "main"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore MucLucHoSo.sln

      - name: Build (Release)
        run: dotnet build MucLucHoSo.sln -c Release --no-restore

      - name: Publish App (single-file exe, self-contained win-x64)
        run: >
          dotnet publish src/MucLucHoSo.App/MucLucHoSo.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none
          -o publish

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: MucLucHoSo-win-x64
          path: publish
          if-no-files-found: error
