name: Release

# On a version tag (v*): run Core tests, publish the portable win-x64 app, zip it,
# and create a GitHub Release with the zip attached. Marked pre-release because the
# WinForms/WebView2 UI still needs manual verification on Windows (mota3 §13).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Run Core tests
        run: dotnet test MucLucTaiLieu.sln -c Release

      - name: Publish App (single-file exe, self-contained win-x64)
        run: >
          dotnet publish MucLucTaiLieu.App/MucLucTaiLieu.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none
          -o publish

      - name: Zip artifact (print_mltl.exe + Web/ + Assets/)
        run: Compress-Archive -Path publish/* -DestinationPath "print_mltl-${{ github.ref_name }}-win-x64.zip"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          "print_mltl-${{ github.ref_name }}-win-x64.zip"
          --title "MụcLụcTàiLiệu ${{ github.ref_name }}"
          --notes "Bản build .NET 8 WinForms + WebView2 — **1 file print_mltl.exe** (self-contained, không cần cài .NET). Giải nén zip rồi chạy print_mltl.exe; giữ nguyên thư mục Web/ và Assets/ cạnh exe. Cần WebView2 Runtime trên máy đích (đa số Win10/11 có sẵn). Lưu ý: giao diện/PrintToPdf nên kiểm thử trên Windows (xem docs/winform-webview2-app.md)."
