name: Release

# On a version tag (v*): build the MucLucHoSo solution, publish the WPF app as a
# self-contained single-file win-x64 build (kèm templates/), zip it, and create a
# GitHub Release with the zip attached. Xuất PDF cần Microsoft Word trên máy đích;
# đường DOCX chạy độc lập không cần Word.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore MucLucHoSo.sln

      - name: Build (Release)
        run: dotnet build MucLucHoSo.sln -c Release --no-restore

      - name: Publish App (single-file exe, self-contained win-x64)
        run: >
          dotnet publish src/MucLucHoSo.App/MucLucHoSo.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none
          -o publish

      - name: Zip artifact (MLHS.exe + templates/)
        run: Compress-Archive -Path publish/* -DestinationPath "MLHS-${{ github.ref_name }}-win-x64.zip"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          "MLHS-${{ github.ref_name }}-win-x64.zip"
          --title "MLHS ${{ github.ref_name }}"
          --notes "Bản build .NET 8 WPF — **1 file MLHS.exe** (self-contained, không cần cài .NET). Giải nén zip rồi chạy MLHS.exe; giữ nguyên thư mục templates/ cạnh exe. Đường DOCX chạy độc lập; xuất PDF cần cài **Microsoft Word** trên máy đích."
